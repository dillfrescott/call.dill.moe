<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        window.onload = function() {
            // Get the path after the slash
            let path = window.location.pathname.substring(1);
            
            // Check if there's a valid path
            if (path) {
                // Construct the target URL
                let targetUrl = `https://vdo.dill.moe/?room=${encodeURIComponent(path)}&sl&l&crb&ssp&avatar`;
                
                // Redirect to the constructed URL
                window.location.href = targetUrl;
            } else {
                document.body.innerHTML = "<h1>Invalid room ID</h1><p>Please provide a valid room ID in the URL.</p>";
            }
        };
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
